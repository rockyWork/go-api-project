version: '3.8'

# 开发环境 Docker Compose 配置
# 仅启动基础设施服务（MySQL、Redis），应用在本地运行

services:
  mysql:
    image: mysql:8.0
    container_name: go-api-mysql-dev
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: go_api_project
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-dev-data:/var/lib/mysql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - go-api-dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis（预留）
  # redis:
  #   image: redis:7-alpine
  #   container_name: go-api-redis-dev
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-dev-data:/data
  #   networks:
  #     - go-api-dev-network
  #   restart: unless-stopped

  # Adminer - 数据库管理工具（可选）
  adminer:
    image: adminer:latest
    container_name: go-api-adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    networks:
      - go-api-dev-network
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-dev-data:
  # redis-dev-data:

networks:
  go-api-dev-network:
    driver: bridge
