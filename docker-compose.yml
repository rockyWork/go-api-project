version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
    container_name: go-api-app
    ports:
      - "8080:8080"
    environment:
      - CONFIG_PATH=/root/config/config.yaml
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - go-api-network
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: go-api-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: go_api_project
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - go-api-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis服务（预留，当前未使用）
  # redis:
  #   image: redis:7-alpine
  #   container_name: go-api-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - go-api-network
  #   restart: unless-stopped

volumes:
  mysql-data:
  # redis-data:

networks:
  go-api-network:
    driver: bridge
